<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="50%" stop-color="#090812"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC1133"/>
      <stop offset="40%" stop-color="#FF2244"/>
      <stop offset="100%" stop-color="#FF4466"/>
    </linearGradient>
    <linearGradient id="lineLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2244" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF2244" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="lineRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF2244" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF2244" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgbloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Ambient red bloom behind title -->
  <ellipse cx="600" cy="200" rx="300" ry="160" fill="#FF2244" opacity="0.06" filter="url(#bgbloom)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.12" fill="#FF2244">
    <!-- Row 1 -->
    <circle cx="40"  cy="40"  r="1.5"/><circle cx="80"  cy="40"  r="1.5"/><circle cx="120" cy="40"  r="1.5"/>
    <circle cx="160" cy="40"  r="1.5"/><circle cx="200" cy="40"  r="1.5"/><circle cx="240" cy="40"  r="1.5"/>
    <circle cx="280" cy="40"  r="1.5"/><circle cx="320" cy="40"  r="1.5"/>
    <circle cx="880" cy="40"  r="1.5"/><circle cx="920" cy="40"  r="1.5"/><circle cx="960" cy="40"  r="1.5"/>
    <circle cx="1000" cy="40" r="1.5"/><circle cx="1040" cy="40" r="1.5"/><circle cx="1080" cy="40" r="1.5"/>
    <circle cx="1120" cy="40" r="1.5"/><circle cx="1160" cy="40" r="1.5"/>
    <!-- Row 2 -->
    <circle cx="40"  cy="80"  r="1.5"/><circle cx="80"  cy="80"  r="1.5"/><circle cx="120" cy="80"  r="1.5"/>
    <circle cx="160" cy="80"  r="1.5"/><circle cx="200" cy="80"  r="1.5"/><circle cx="240" cy="80"  r="1.5"/>
    <circle cx="280" cy="80"  r="1.5"/><circle cx="320" cy="80"  r="1.5"/>
    <circle cx="880" cy="80"  r="1.5"/><circle cx="920" cy="80"  r="1.5"/><circle cx="960" cy="80"  r="1.5"/>
    <circle cx="1000" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1080" cy="80" r="1.5"/>
    <circle cx="1120" cy="80" r="1.5"/><circle cx="1160" cy="80" r="1.5"/>
    <!-- Row 3 -->
    <circle cx="40"  cy="120" r="1.5"/><circle cx="80"  cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/>
    <circle cx="160" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/>
    <circle cx="880" cy="120" r="1.5"/><circle cx="920" cy="120" r="1.5"/><circle cx="960" cy="120" r="1.5"/>
    <circle cx="1000" cy="120" r="1.5"/><circle cx="1040" cy="120" r="1.5"/><circle cx="1080" cy="120" r="1.5"/>
    <circle cx="1120" cy="120" r="1.5"/><circle cx="1160" cy="120" r="1.5"/>
    <!-- Bottom rows -->
    <circle cx="40"  cy="320" r="1.5"/><circle cx="80"  cy="320" r="1.5"/><circle cx="120" cy="320" r="1.5"/>
    <circle cx="160" cy="320" r="1.5"/><circle cx="200" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/>
    <circle cx="280" cy="320" r="1.5"/><circle cx="320" cy="320" r="1.5"/>
    <circle cx="880" cy="320" r="1.5"/><circle cx="920" cy="320" r="1.5"/><circle cx="960" cy="320" r="1.5"/>
    <circle cx="1000" cy="320" r="1.5"/><circle cx="1040" cy="320" r="1.5"/><circle cx="1080" cy="320" r="1.5"/>
    <circle cx="1120" cy="320" r="1.5"/><circle cx="1160" cy="320" r="1.5"/>
    <circle cx="40"  cy="360" r="1.5"/><circle cx="80"  cy="360" r="1.5"/><circle cx="120" cy="360" r="1.5"/>
    <circle cx="160" cy="360" r="1.5"/><circle cx="200" cy="360" r="1.5"/><circle cx="240" cy="360" r="1.5"/>
    <circle cx="280" cy="360" r="1.5"/><circle cx="320" cy="360" r="1.5"/>
    <circle cx="880" cy="360" r="1.5"/><circle cx="920" cy="360" r="1.5"/><circle cx="960" cy="360" r="1.5"/>
    <circle cx="1000" cy="360" r="1.5"/><circle cx="1040" cy="360" r="1.5"/><circle cx="1080" cy="360" r="1.5"/>
    <circle cx="1120" cy="360" r="1.5"/><circle cx="1160" cy="360" r="1.5"/>
  </g>

  <!-- Left circuit traces -->
  <g stroke="#FF2244" fill="none">
    <polyline points="40,160 120,160 140,140 200,140" stroke-width="1" opacity="0.25"/>
    <polyline points="40,200 80,200 100,180 180,180" stroke-width="0.8" opacity="0.2"/>
    <polyline points="40,240 100,240 120,220 200,220" stroke-width="1" opacity="0.2"/>
    <polyline points="40,280 120,280 140,260 200,260" stroke-width="0.8" opacity="0.15"/>
    <line x1="80" y1="155" x2="80" y2="245" stroke-width="0.8" opacity="0.2"/>
    <circle cx="120" cy="160" r="3" fill="#FF2244" opacity="0.3"/>
    <circle cx="100" cy="180" r="2" fill="#FF2244" opacity="0.25"/>
    <circle cx="80"  cy="200" r="3" fill="#FF2244" opacity="0.3"/>
  </g>

  <!-- Right circuit traces -->
  <g stroke="#FF2244" fill="none">
    <polyline points="1160,160 1080,160 1060,140 1000,140" stroke-width="1" opacity="0.25"/>
    <polyline points="1160,200 1120,200 1100,180 1020,180" stroke-width="0.8" opacity="0.2"/>
    <polyline points="1160,240 1100,240 1080,220 1000,220" stroke-width="1" opacity="0.2"/>
    <polyline points="1160,280 1080,280 1060,260 1000,260" stroke-width="0.8" opacity="0.15"/>
    <line x1="1120" y1="155" x2="1120" y2="245" stroke-width="0.8" opacity="0.2"/>
    <circle cx="1080" cy="160" r="3" fill="#FF2244" opacity="0.3"/>
    <circle cx="1100" cy="180" r="2" fill="#FF2244" opacity="0.25"/>
    <circle cx="1120" cy="200" r="3" fill="#FF2244" opacity="0.3"/>
  </g>

  <!-- Left decorative bot shape -->
  <g transform="translate(130, 200)" opacity="0.35">
    <rect x="-28" y="-38" width="56" height="44" rx="6" fill="none" stroke="#FF2244" stroke-width="1.5"/>
    <rect x="-18" y="-28" width="10" height="10" rx="2" fill="#FF2244" opacity="0.7"/>
    <rect x="8"  y="-28" width="10" height="10" rx="2" fill="#FF2244" opacity="0.7"/>
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#FF2244" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-38" x2="0" y2="-50" stroke="#FF2244" stroke-width="1.5"/>
    <circle cx="0" cy="-54" r="4" fill="none" stroke="#FF2244" stroke-width="1.5"/>
    <rect x="-36" y="-22" width="8" height="18" rx="3" fill="none" stroke="#FF2244" stroke-width="1"/>
    <rect x="28"  y="-22" width="8" height="18" rx="3" fill="none" stroke="#FF2244" stroke-width="1"/>
    <rect x="-20" y="6"  width="14" height="24" rx="3" fill="none" stroke="#FF2244" stroke-width="1"/>
    <rect x="6"   y="6"  width="14" height="24" rx="3" fill="none" stroke="#FF2244" stroke-width="1"/>
  </g>

  <!-- Right decorative hexagon -->
  <g transform="translate(1070, 200)" opacity="0.3">
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="#FF2244" stroke-width="1.5"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#FF2244" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#FF2244" opacity="0.2"/>
    <line x1="-26" y1="-15" x2="26" y2="-15" stroke="#FF2244" stroke-width="0.8" opacity="0.4"/>
    <line x1="-26" y1="15"  x2="26" y2="15"  stroke="#FF2244" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Top border line -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="#FF2244" stroke-width="2" opacity="0.5"/>
  <!-- Bottom border line -->
  <line x1="0" y1="398" x2="1200" y2="398" stroke="#FF2244" stroke-width="2" opacity="0.5"/>
  <!-- Corner accents TL -->
  <polyline points="0,0 60,0 60,4" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <polyline points="0,0 0,60 4,60" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <!-- Corner accents TR -->
  <polyline points="1200,0 1140,0 1140,4" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <polyline points="1200,0 1200,60 1196,60" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <!-- Corner accents BL -->
  <polyline points="0,400 60,400 60,396" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <polyline points="0,400 0,340 4,340" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <!-- Corner accents BR -->
  <polyline points="1200,400 1140,400 1140,396" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>
  <polyline points="1200,400 1200,340 1196,340" fill="none" stroke="#FF2244" stroke-width="2" opacity="0.8"/>

  <!-- Horizontal separator lines flanking title -->
  <line x1="50" y1="200" x2="340" y2="200" stroke="url(#lineLeft)" stroke-width="1"/>
  <line x1="860" y1="200" x2="1150" y2="200" stroke="url(#lineRight)" stroke-width="1"/>

  <!-- Main title glow layer -->
  <text x="600" y="190" text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="96" font-weight="700" letter-spacing="-2"
    fill="#FF2244" opacity="0.25" filter="url(#glow)">ErosLab</text>

  <!-- Main title -->
  <text x="600" y="190" text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="96" font-weight="700" letter-spacing="-2"
    fill="url(#titleGrad)">ErosLab</text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="22" font-weight="400" letter-spacing="8"
    fill="#ffffff" opacity="0.55">BOT ECOSYSTEM</text>

  <!-- Thin line under subtitle -->
  <line x1="440" y1="248" x2="760" y2="248" stroke="#FF2244" stroke-width="0.5" opacity="0.4"/>

  <!-- Feature tags -->
  <g font-family="'Courier New', 'Lucida Console', monospace" font-size="12" fill="#FF2244">
    <!-- Tag 1 -->
    <rect x="310" y="268" width="128" height="24" rx="4" fill="#FF2244" fill-opacity="0.08" stroke="#FF2244" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="374" y="284" text-anchor="middle" opacity="0.85">GitHub Actions</text>
    <!-- Tag 2 -->
    <rect x="452" y="268" width="96" height="24" rx="4" fill="#FF2244" fill-opacity="0.08" stroke="#FF2244" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="500" y="284" text-anchor="middle" opacity="0.85">Python 3.11</text>
    <!-- Tag 3 -->
    <rect x="562" y="268" width="80" height="24" rx="4" fill="#FF2244" fill-opacity="0.08" stroke="#FF2244" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="602" y="284" text-anchor="middle" opacity="0.85">Groq AI</text>
    <!-- Tag 4 -->
    <rect x="656" y="268" width="110" height="24" rx="4" fill="#FF2244" fill-opacity="0.08" stroke="#FF2244" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="711" y="284" text-anchor="middle" opacity="0.85">Serverless 24/7</text>
    <!-- Tag 5 -->
    <rect x="780" y="268" width="110" height="24" rx="4" fill="#FF2244" fill-opacity="0.08" stroke="#FF2244" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="835" y="284" text-anchor="middle" opacity="0.85">Gist Database</text>
  </g>

  <!-- Bottom status line -->
  <text x="600" y="340" text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="11" letter-spacing="3"
    fill="#FF2244" opacity="0.35">TELEGRAM • CIVITAI • RULE34 • WALLHAVEN • FFMPEG • LLAMA 3</text>

  <!-- Blinking cursor accent -->
  <rect x="726" y="170" width="10" height="70" rx="2" fill="#FF2244" opacity="0.6"/>
</svg>
