name: ErosLab Bot

on:
  schedule:
    - cron: '0 5,7,9,11,13,15,16,17,18,19,20 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем боту пушить обновленную базу данных
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests Pillow python-telegram-bot

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CIVITAI_API_KEY: ${{ secrets.CIVITAI_API_KEY }}
        run: python civitai_bot.py

      - name: Save History to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.json posted_hashes.json stats.json || true
          git commit -m "Update posted history [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"